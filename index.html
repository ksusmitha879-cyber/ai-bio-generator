<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Bio Generator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    /* ── Reset & Base ───────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F7F6F3;
      --surface:   #FFFFFF;
      --border:    #E4E2DC;
      --border-md: #C8C5BC;
      --text:      #1A1916;
      --muted:     #6B6860;
      --hint:      #A09D97;
      --accent:    #4A3F8F;
      --accent-lt: #EEEDFE;
      --accent-dk: #3C3489;
      --success:   #0F6E56;
      --success-lt:#E1F5EE;
      --danger:    #A32D2D;
      --danger-lt: #FCEBEB;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --shadow:    0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.05);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #131210;
        --surface:   #1E1C1A;
        --border:    #2E2C28;
        --border-md: #3E3C38;
        --text:      #F0EDE8;
        --muted:     #9E9B95;
        --hint:      #6B6860;
        --accent:    #7F77DD;
        --accent-lt: #26215C;
        --accent-dk: #CECBF6;
        --success:   #5DCAA5;
        --success-lt:#04342C;
        --danger:    #F09595;
        --danger-lt: #501313;
        --shadow:    0 1px 3px rgba(0,0,0,0.3);
        --shadow-lg: 0 4px 16px rgba(0,0,0,0.4);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    /* ── Layout ─────────────────────────────────────── */
    .container {
      max-width: 660px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header-icon {
      width: 52px; height: 52px;
      background: var(--accent-lt);
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      font-size: 24px;
      color: var(--accent);
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 15px;
      color: var(--muted);
    }

    /* ── Card ───────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
      box-shadow: var(--shadow);
      margin-bottom: 1rem;
    }

    /* ── Section Heading ────────────────────────────── */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--hint);
      margin-bottom: 10px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    /* ── Form Fields ────────────────────────────────── */
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
    }

    input[type="text"], input[type="email"] {
      height: 38px;
      padding: 0 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text);
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    input[type="text"]:focus, input[type="email"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
    }

    input::placeholder { color: var(--hint); }

    /* ── Platform Buttons ───────────────────────────── */
    .platform-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .platform-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 12px 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      font-family: inherit;
      transition: all 0.15s;
    }

    .platform-btn i { font-size: 22px; }
    .platform-btn:hover { border-color: var(--border-md); color: var(--text); }

    .platform-btn.active {
      background: var(--accent-lt);
      border-color: var(--accent);
      color: var(--accent-dk);
    }

    /* ── Tone Buttons ───────────────────────────────── */
    .tone-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .tone-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 9px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      font-family: inherit;
      transition: all 0.15s;
    }

    .tone-btn i { font-size: 14px; }
    .tone-btn:hover { border-color: var(--border-md); color: var(--text); }

    .tone-btn.active {
      background: var(--success-lt);
      border-color: var(--success);
      color: var(--success);
    }

    /* ── Slider ─────────────────────────────────────── */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .slider-row input[type="range"] {
      flex: 1;
      height: 4px;
      appearance: none;
      -webkit-appearance: none;
      background: var(--border);
      border-radius: 99px;
      outline: none;
      cursor: pointer;
    }

    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--surface);
      box-shadow: var(--shadow);
    }

    .slider-row input[type="range"]::-moz-range-thumb {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--surface);
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
    }

    .slider-labels span {
      font-size: 11px;
      color: var(--hint);
    }

    .char-display {
      min-width: 54px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-lt);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
    }

    /* ── Generate Button ────────────────────────────── */
    .generate-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #FFFFFF;
      border: none;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: -0.2px;
    }

    .generate-btn:hover:not(:disabled) { opacity: 0.9; }
    .generate-btn:active:not(:disabled) { transform: scale(0.99); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Spinner ────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
    }

    /* ── Output Card ────────────────────────────────── */
    .output-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .output-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
    }

    .output-meta i { font-size: 16px; color: var(--accent); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 99px;
    }

    .badge-platform {
      background: var(--accent-lt);
      color: var(--accent-dk);
    }

    .badge-tone {
      background: var(--success-lt);
      color: var(--success);
    }

    .output-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 11px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .action-btn i { font-size: 14px; }
    .action-btn:hover { border-color: var(--border-md); color: var(--text); background: var(--bg); }

    .action-btn.success {
      color: var(--success);
      border-color: var(--success);
      background: var(--success-lt);
    }

    .output-body { padding: 1.5rem; }

    .bio-text {
      font-size: 16px;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
    }

    .output-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .char-pill {
      font-size: 12px;
      color: var(--hint);
    }

    .char-pill span {
      font-weight: 600;
      color: var(--muted);
    }

    .regen-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: var(--radius-sm);
      padding: 5px 11px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .regen-btn:hover { background: var(--accent-lt); }
    .regen-btn i { font-size: 13px; }

    /* ── Error ──────────────────────────────────────── */
    .error-box {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      background: var(--danger-lt);
      border: 1px solid color-mix(in srgb, var(--danger) 30%, transparent);
      border-radius: var(--radius-md);
      font-size: 13px;
      color: var(--danger);
      margin-top: 1rem;
    }

    .error-box i { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    /* ── Examples ───────────────────────────────────── */
    .examples {
      margin-bottom: 1.5rem;
    }

    .example-label {
      font-size: 12px;
      color: var(--hint);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .example-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      font-size: 12px;
      padding: 5px 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      cursor: pointer;
      color: var(--muted);
      font-family: inherit;
      transition: all 0.15s;
    }

    .chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }

    /* ── Footer ─────────────────────────────────────── */
    .footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 12px;
      color: var(--hint);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 500px) {
      .field-grid { grid-template-columns: 1fr; }
      .field.full { grid-column: 1; }
      .platform-grid { grid-template-columns: repeat(2, 1fr); }
      .tone-grid { grid-template-columns: repeat(2, 1fr); }
      .output-header { flex-direction: column; align-items: flex-start; gap: 10px; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-icon"><i class="ti ti-sparkles"></i></div>
    <h1>AI bio generator</h1>
    <p>Create a compelling, platform-specific bio in seconds.</p>
  </div>

  <!-- Quick Fill Examples -->
  <div class="examples">
    <p class="example-label">Try an example</p>
    <div class="example-chips">
      <button class="chip" onclick="fillExample('designer')">Graphic Designer</button>
      <button class="chip" onclick="fillExample('engineer')">Software Engineer</button>
      <button class="chip" onclick="fillExample('photographer')">Photographer</button>
      <button class="chip" onclick="fillExample('coach')">Life Coach</button>
    </div>
  </div>

  <!-- Main Form Card -->
  <div class="card">

    <!-- Basic Info -->
    <p class="section-title">About you</p>
    <div class="field-grid">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" placeholder="Sarah Chen" />
      </div>
      <div class="field">
        <label for="job">Job / role</label>
        <input type="text" id="job" placeholder="Graphic Designer" />
      </div>
      <div class="field full">
        <label for="hobbies">Hobbies / interests</label>
        <input type="text" id="hobbies" placeholder="Rock climbing, baking sourdough, travel photography" />
      </div>
      <div class="field full">
        <label for="goal">Goal with this bio</label>
        <input type="text" id="goal" placeholder="Attract freelance clients and collaborators" />
      </div>
    </div>

    <div class="divider"></div>

    <!-- Platform -->
    <p class="section-title">Target platform</p>
    <div class="platform-grid" id="platformGrid">
      <button class="platform-btn active" data-val="LinkedIn"><i class="ti ti-brand-linkedin"></i>LinkedIn</button>
      <button class="platform-btn" data-val="Twitter/X"><i class="ti ti-brand-x"></i>Twitter/X</button>
      <button class="platform-btn" data-val="Personal Website"><i class="ti ti-world"></i>Website</button>
      <button class="platform-btn" data-val="Instagram"><i class="ti ti-brand-instagram"></i>Instagram</button>
    </div>

    <div class="divider"></div>

    <!-- Tone -->
    <p class="section-title">Tone</p>
    <div class="tone-grid" id="toneGrid">
      <button class="tone-btn active" data-val="Professional and authoritative"><i class="ti ti-briefcase"></i> Professional</button>
      <button class="tone-btn" data-val="Witty and playful"><i class="ti ti-mood-happy"></i> Witty</button>
      <button class="tone-btn" data-val="Casual and friendly"><i class="ti ti-coffee"></i> Casual</button>
      <button class="tone-btn" data-val="Bold and confident"><i class="ti ti-flame"></i> Bold</button>
      <button class="tone-btn" data-val="Warm and approachable"><i class="ti ti-heart"></i> Warm</button>
      <button class="tone-btn" data-val="Minimalist and concise"><i class="ti ti-minus"></i> Minimal</button>
    </div>

    <div class="divider"></div>

    <!-- Character Limit -->
    <p class="section-title">Character limit</p>
    <div class="slider-row">
      <input type="range" id="charSlider" min="80" max="500" step="10" value="200"
        oninput="document.getElementById('charDisplay').textContent = this.value + ' chars'" />
      <div class="char-display" id="charDisplay">200 chars</div>
    </div>
    <div class="slider-labels">
      <span>Short (80)</span>
      <span>Tweet (280)</span>
      <span>Long (500)</span>
    </div>

  </div>

  <!-- Generate Button -->
  <button class="generate-btn" id="genBtn" onclick="generate()">
    <i class="ti ti-sparkles"></i>
    Generate bio
  </button>

  <!-- Error Box -->
  <div id="errorBox" style="display:none"></div>

  <!-- Output -->
  <div id="outputWrap" style="display:none; margin-top: 1rem;">
    <div class="output-card">
      <div class="output-header">
        <div class="output-meta">
          <i class="ti ti-file-text"></i>
          Your bio
          <span class="badge badge-platform" id="platformBadge">LinkedIn</span>
          <span class="badge badge-tone" id="toneBadge">Professional</span>
        </div>
        <div class="output-actions">
          <button class="action-btn" id="copyBtn" onclick="copyBio()">
            <i class="ti ti-copy"></i>Copy
          </button>
        </div>
      </div>
      <div class="output-body">
        <p class="bio-text" id="bioText"></p>
        <div class="output-footer">
          <p class="char-pill"><span id="charCount">0</span> characters</p>
          <button class="regen-btn" onclick="generate()">
            <i class="ti ti-refresh"></i>Regenerate
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    Powered by Claude · <a href="https://anthropic.com" target="_blank">Anthropic</a>
  </div>

</div>

<script>
  /* ── State ───────────────────────────────────── */
  let selectedPlatform = 'LinkedIn';
  let selectedTone     = 'Professional and authoritative';

  /* ── Platform Selection ──────────────────────── */
  document.getElementById('platformGrid').addEventListener('click', e => {
    const btn = e.target.closest('.platform-btn');
    if (!btn) return;
    document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedPlatform = btn.dataset.val;
  });

  /* ── Tone Selection ──────────────────────────── */
  document.getElementById('toneGrid').addEventListener('click', e => {
    const btn = e.target.closest('.tone-btn');
    if (!btn) return;
    document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedTone = btn.dataset.val;
  });

  /* ── Example Presets ─────────────────────────── */
  const examples = {
    designer: {
      name: 'Sarah Chen', job: 'Graphic Designer',
      hobbies: 'Rock climbing, baking sourdough, travel photography',
      goal: 'Attract freelance clients and brand collaborations'
    },
    engineer: {
      name: 'Marcus Williams', job: 'Full-Stack Engineer',
      hobbies: 'Open-source projects, hiking, chess',
      goal: 'Land a senior engineering role at a product company'
    },
    photographer: {
      name: 'Priya Nair', job: 'Wedding & Portrait Photographer',
      hobbies: 'Film photography, yoga, cooking Indian food',
      goal: 'Book more wedding clients for the upcoming season'
    },
    coach: {
      name: 'James Taylor', job: 'Certified Life & Career Coach',
      hobbies: 'Marathon running, journaling, reading non-fiction',
      goal: 'Build an audience and grow my online coaching practice'
    }
  };

  function fillExample(key) {
    const e = examples[key];
    document.getElementById('name').value    = e.name;
    document.getElementById('job').value     = e.job;
    document.getElementById('hobbies').value = e.hobbies;
    document.getElementById('goal').value    = e.goal;
  }

  /* ── Generate ────────────────────────────────── */
  async function generate() {
    const name     = document.getElementById('name').value.trim();
    const job      = document.getElementById('job').value.trim();
    const hobbies  = document.getElementById('hobbies').value.trim();
    const goal     = document.getElementById('goal').value.trim();
    const charLimit= document.getElementById('charSlider').value;

    if (!name || !job) {
      showError('Please enter at least your name and job role to get started.');
      return;
    }

    setLoading(true);
    hideError();
    document.getElementById('outputWrap').style.display = 'none';

    const details = [
      `Name: ${name}`,
      `Job/Role: ${job}`,
      hobbies ? `Hobbies & Interests: ${hobbies}` : '',
      goal    ? `Goal: ${goal}` : ''
    ].filter(Boolean).join('\n');

    const prompt = `You are an expert copywriter specializing in personal branding. Your task is to write a compelling professional bio.

Platform: ${selectedPlatform}
Tone: ${selectedTone}
Character limit: Strictly under ${charLimit} characters

Details:
${details}

Instructions:
- Write ONLY the bio text — no intro sentence, no quotes, no explanation
- Match the style and expectations of ${selectedPlatform} users
- The tone must be ${selectedTone}
- Stay strictly under ${charLimit} characters
- Make it authentic, specific, and engaging
- End with a subtle call-to-action if appropriate for the platform`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const bio  = data.content.map(b => b.text || '').join('').trim();

      if (!bio) throw new Error('Received an empty response. Please try again.');

      showOutput(bio);
    } catch (err) {
      showError('Generation failed: ' + err.message);
    } finally {
      setLoading(false);
    }
  }

  /* ── UI Helpers ──────────────────────────────── */
  function setLoading(on) {
    const btn = document.getElementById('genBtn');
    btn.disabled = on;
    btn.innerHTML = on
      ? '<span class="spinner"></span>Generating your bio…'
      : '<i class="ti ti-sparkles"></i>Generate bio';
  }

  function showOutput(bio) {
    const toneLabel = selectedTone.split(' ')[0]; // first word only
    document.getElementById('bioText').textContent = bio;
    document.getElementById('platformBadge').textContent = selectedPlatform;
    document.getElementById('toneBadge').textContent = toneLabel;
    document.getElementById('charCount').textContent = bio.length;
    document.getElementById('outputWrap').style.display = 'block';
    document.getElementById('outputWrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    resetCopyBtn();
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.className = 'error-box';
    box.style.display = 'flex';
    box.innerHTML = `<i class="ti ti-alert-circle"></i><span>${msg}</span>`;
  }

  function hideError() {
    document.getElementById('errorBox').style.display = 'none';
  }

  /* ── Copy ────────────────────────────────────── */
  function copyBio() {
    const text = document.getElementById('bioText').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.innerHTML = '<i class="ti ti-check"></i>Copied!';
      btn.classList.add('success');
      setTimeout(resetCopyBtn, 2200);
    }).catch(() => {
      showError('Could not copy to clipboard. Please select the text manually.');
    });
  }

  function resetCopyBtn() {
    const btn = document.getElementById('copyBtn');
    btn.innerHTML = '<i class="ti ti-copy"></i>Copy';
    btn.classList.remove('success');
  }

  /* ── Enter key shortcut ──────────────────────── */
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') generate();
  });
</script>

</body>
</html>
